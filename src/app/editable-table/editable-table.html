<section>
    <h2>Editable Table</h2>

    <table mex-table [border]="true" class="demo-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Team</th>
                <th>Role</th>
                <th>Tenure (yrs)</th>
            </tr>
        </thead>

        <tbody>
            @for (eng of data.engineers; track eng.name) {
                <tr>
                    <td mex-editable-table-cell [value]="eng.name" [emitOnBlur]="true" (onValueChange)="onCellEdit($event)"></td>
                    <td mex-editable-table-cell [value]="eng.role" [emitOnBlur]="true" (onValueChange)="onCellEdit($event)"></td>
                    <td mex-editable-table-cell [value]="eng.team" [emitOnBlur]="true" (onValueChange)="onCellEdit($event)"></td>
                    <td mex-editable-table-cell [value]="eng.tenure + ''" [emitOnBlur]="true" (onValueChange)="onCellEdit($event)"></td>
                </tr>
            }
        </tbody>

        <tfoot>
            <tr>
                <th colspan="3">Total</th>
                <th>{{ data.totalTenure }}</th>
            </tr>
        </tfoot>
    </table>
</section>
