<span
    class="mex-sortable-table-cell_content"
    [class]="contentClass()">
    <span
        class="mex-sortable-table-cell__title"
        (click)="sort.emit()">
        <ng-content />
    </span>

    @let isSorting = sorting();
    @let isFiltering = showFilterIcon();

    @if (isSorting || isFiltering) {
        <span
            animate.enter="icon-enter-animation"
            animate.leave="icon-leave-animation"
            class="mex-sortable-table-cell__actions">
            @if (isSorting) {
                <span
                    animate.enter="icon-enter-animation"
                    animate.leave="icon-leave-animation"
                    class="mex-sortable-table-cell__actions--button-wrapper">
                    <button (click)="sort.emit()">
                        <mex-symbol>
                            {{ sortIcon() }}
                        </mex-symbol>
                    </button>
                </span>
            }

            @if (isFiltering && !disableFilter()) {
                <span
                    animate.enter="icon-enter-animation"
                    animate.leave="icon-leave-animation"
                    class="mex-sortable-table-cell__actions--button-wrapper">
                    <button [matSelectTriggerFor]="selectFilter">
                        <mex-symbol [class.filtered]="isFiltered()">
                            filter_alt
                        </mex-symbol>
                    </button>
                </span>
            }
        </span>
    }

    <mat-select
        #selectFilter
        multiple
        [style.width.px]="0"
        [style.height.px]="0"
        [style.overflow]="'hidden'"
        (opened)="filtering.set(true)"
        (closed)="this.filterVals.set(selectFilter.value);filtering.set(false)">
        @if (filterOpts(); as vals) {
            @for (val of vals; track $index) {
                <mat-option [value]="val">
                    {{ val ?? '(blank)' }}
                </mat-option>
            }
        }
    </mat-select>

    <!-- <span> -->

    <!-- </span> -->
</span>
